<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to SecretKeeper</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="field">
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Username"
          class="field-input"
          autocomplete="username"
        />
      </div>
      <div class="field">
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Password"
          class="field-input"
          autocomplete="current-password"
        />
      </div>

      @if (successMessage) {
        <div class="feedback success">{{ successMessage }}</div>
      }
      @if (errorMessage) {
        <div class="feedback error">{{ errorMessage }}</div>
      }

      <button type="submit" class="auth-btn login-button">Login</button>
    </form>

    <div class="auth-links">
      <p>No account? <a (click)="goToSignup()">Sign up here</a></p>
      <p>Forgot your password? <a (click)="goToForgotPassword()">Reset it here</a></p>
    </div>
  </div>
</div>
