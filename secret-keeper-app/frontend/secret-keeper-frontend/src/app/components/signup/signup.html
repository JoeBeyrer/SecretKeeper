<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Create an account</h1>
    <p class="auth-subtitle">Join SecretKeeper today</p>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="field">
        <input
          id="username"
          type="text"
          formControlName="username"
          placeholder="Username"
          class="field-input"
          autocomplete="username"
        />
      </div>
      <div class="field">
        <input
          id="email"
          type="text"
          formControlName="email"
          placeholder="Email"
          class="field-input"
          autocomplete="email"
        />
      </div>
      <div class="field">
        <input
          id="password"
          type="password"
          formControlName="password"
          placeholder="Password"
          class="field-input"
          autocomplete="new-password"
        />
      </div>
      <div class="field">
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          placeholder="Confirm Password"
          class="field-input"
          autocomplete="new-password"
        />
      </div>

      @if (errorMessage) {
        <div class="feedback error">{{ errorMessage }}</div>
      }
      @if (successMessage) {
        <div class="feedback success">{{ successMessage }}</div>
      }

      <button type="submit" class="auth-btn signup-button">Sign Up</button>
    </form>

    <div class="auth-links">
      <p>Already have an account? <a (click)="goToLogin()">Log in</a></p>
    </div>
  </div>
</div>
