<div class="messaging-container">
  <div class="messaging-card">
    <div class="messaging-header">
      <h1>Messages</h1>
      <button class="profile-button" (click)="goToProfile()">My Profile</button>
    </div>

    @if (errorMessage) {
      <div class="error-message">{{ errorMessage }}</div>
    }

    @if (!isConnected) {
      <div class="conv-setup">
        <div class="conv-setup-section">
          <p class="conv-label">Join an existing conversation</p>
          <div class="conv-input-row">
            <input
              type="text"
              [(ngModel)]="conversationId"
              placeholder="Paste conversation ID"
              class="form-control"
            />
            <button class="send-button" (click)="connectToConversation()">Join</button>
          </div>
        </div>

        <div class="conv-divider">or</div>

        <div class="conv-setup-section">
          <p class="conv-label">Start a new conversation</p>
          <div class="conv-input-row">
            <input
              type="text"
              [(ngModel)]="newConversationMemberId"
              placeholder="Enter the other user's ID"
              class="form-control"
            />
            <button class="send-button" (click)="startNewConversation()">Start</button>
          </div>
        </div>
      </div>
    }

    @if (isConnected) {
      <div class="message-list">
        @for (msg of messages; track msg.time + msg.username) {
          <div class="message-item">
            <div class="message-header">
              <span class="message-username">{{ msg.username }}</span>
              <span class="message-time">{{ msg.time }}</span>
            </div>
            <div class="message-content">{{ msg.content }}</div>
          </div>
        }
      </div>

      <div class="message-input-area">
        <div class="form-group">
          <input
            type="text"
            [(ngModel)]="newMessage"
            placeholder="Send a message"
            class="form-control"
            (keydown.enter)="sendMessage()"
          />
        </div>
        <button class="send-button" (click)="sendMessage()">Send</button>
      </div>
    }
  </div>
</div>
